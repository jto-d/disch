# Cloud Build pipeline: build → push → deploy.
#
# Trigger this from a GitHub push (Cloud Build → Triggers → Connect repository)
# or run it manually:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_REGION=us-central1,_SERVICE=disch,_REPOSITORY=disch
#
# One-time setup (once per project):
#   gcloud artifacts repositories create $_REPOSITORY \
#     --repository-format=docker --location=$_REGION
#   gcloud secrets create disch-database-url   --data-file=- < neon-url.txt
#   gcloud secrets create disch-admin-password --data-file=- < admin-pw.txt
#   gcloud secrets create disch-cookie-secret  --data-file=- < cookie-secret.txt
#   # Grant the Cloud Build service account permission to deploy to Cloud Run
#   # and read the secrets — see README "Cloud Run deployment" section.

substitutions:
  _REGION: us-central1
  _SERVICE: disch
  _REPOSITORY: disch # Artifact Registry repo name
  # Google OAuth client ID — public, baked into the client bundle and used by
  # the server to verify ID tokens. Set on the Cloud Build trigger.
  _GOOGLE_CLIENT_ID: ""

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:${BUILD_ID}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:latest"

steps:
  # 1. Pull the previous :latest image (if any) to warm Docker's layer cache.
  - id: pull-cache
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        docker pull "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:latest" || true

  # 2. Build the image, tagged with both the commit SHA and :latest.
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --cache-from=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:latest
      - --build-arg=VITE_GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID}
      - -t=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:${BUILD_ID}
      - -t=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:latest
      - .

  # 3. Push both tags. (`images:` above also handles this, but explicit pushes
  # let the deploy step happen as a build step in the same pipeline.)
  - id: push-sha
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:${BUILD_ID}

  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:latest

  # 4. Deploy to Cloud Run. --update-* (rather than --set-*) merges with the
  # existing service config, so re-deploys don't wipe other env vars you may
  # have set in the console.
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:${BUILD_ID}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=0
      - --max-instances=3
      - --memory=512Mi
      - --cpu=1
      - --update-env-vars=NODE_ENV=production,GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID}
      - --update-secrets=DATABASE_URL=disch-database-url:latest,ADMIN_PASSWORD=disch-admin-password:latest,COOKIE_SECRET=disch-cookie-secret:latest

timeout: 1200s
